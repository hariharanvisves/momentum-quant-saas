<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Momentum Quant | NIFTY Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --surface-hover: #232f42;
      --border: #2d3a4f;
      --text: #e6edf3;
      --text-muted: #8b9cb3;
      --accent: #22c55e;
      --accent-dim: #16a34a;
      --danger: #ef4444;
      --warning: #f59e0b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
    }

    header {
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .subtitle {
      margin-top: 0.25rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      margin-bottom: 2rem;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .control-group label {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    select {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      padding: 0.5rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
    }

    select:hover, select:focus {
      border-color: var(--accent);
      outline: none;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    button {
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.6rem 1.25rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    button.primary {
      background: var(--accent);
      color: var(--bg);
    }

    button.primary:hover:not(:disabled) {
      background: var(--accent-dim);
      transform: translateY(-1px);
    }

    button.secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    button.secondary:hover:not(:disabled) {
      background: var(--surface-hover);
      border-color: var(--text-muted);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0;
    }

    .toggle-wrap input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .output-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      min-height: 200px;
    }

    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .output-body {
      padding: 1.25rem;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 3rem;
      color: var(--text-muted);
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      padding: 1.25rem;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      color: #fca5a5;
      font-size: 0.9rem;
    }

    .results-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
    }

    .results-table th,
    .results-table td {
      padding: 0.6rem 1rem;
      text-align: left;
    }

    .results-table th {
      color: var(--text-muted);
      font-weight: 500;
      border-bottom: 1px solid var(--border);
    }

    .results-table tr:not(:last-child) td {
      border-bottom: 1px solid rgba(45, 58, 79, 0.6);
    }

    .results-table tr:hover td {
      background: var(--surface-hover);
    }

    .rank {
      width: 48px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .symbol {
      font-weight: 600;
      color: var(--accent);
    }

    .score {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .score.positive { color: var(--accent); }
    .score.negative { color: var(--danger); }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      font-size: 0.7rem;
      border-radius: 4px;
      background: rgba(245, 158, 11, 0.2);
      color: var(--warning);
    }

    .empty {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    @media (max-width: 640px) {
      .container { padding: 1rem; }
      .controls { flex-direction: column; align-items: stretch; }
      .actions { justify-content: stretch; }
      .actions button { flex: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Momentum Quant</h1>
      <p class="subtitle">Live NIFTY momentum scanner · Top 20 by score</p>
    </header>

    <div class="controls">
      <div class="control-group">
        <label for="universe">Universe</label>
        <select id="universe">
          <option value="nifty50">NIFTY 50</option>
          <option value="nifty100">NIFTY 100</option>
          <option value="nifty200">NIFTY 200</option>
          <option value="nifty250">NIFTY 250</option>
          <option value="nifty500" selected>NIFTY 500</option>
        </select>
      </div>

      <div class="actions">
        <button class="primary" id="scanBtn" onclick="scan()">Live Scanner</button>
        <button class="secondary" id="rebalanceBtn" onclick="rebalance()">Weekly Rebalance</button>
        <button class="secondary" id="optimizeBtn" onclick="optimize()">Optimize</button>
      </div>

      <div class="toggle-wrap">
        <input type="checkbox" id="executeToggle">
        <label for="executeToggle">Auto Execute via Zerodha</label>
      </div>
    </div>

    <div class="output-card">
      <div class="output-header">
        <span id="outputTitle">Results</span>
        <span id="outputMeta"></span>
      </div>
      <div class="output-body" id="output">
        <div class="empty">Run Live Scanner, Rebalance, or Optimize to see results</div>
      </div>
    </div>
  </div>

  <script>
    const output = document.getElementById('output');
    const outputTitle = document.getElementById('outputTitle');
    const outputMeta = document.getElementById('outputMeta');
    const scanBtn = document.getElementById('scanBtn');
    const rebalanceBtn = document.getElementById('rebalanceBtn');
    const optimizeBtn = document.getElementById('optimizeBtn');

    function setLoading(loading) {
      [scanBtn, rebalanceBtn, optimizeBtn].forEach(b => b.disabled = loading);
      return loading;
    }

    function showLoading(msg = 'Loading...') {
      output.innerHTML = `<div class="loading"><div class="spinner"></div><span>${msg}</span></div>`;
      outputMeta.textContent = '';
    }

    function showError(err) {
      output.innerHTML = `<div class="error">${escapeHtml(err)}</div>`;
      outputTitle.textContent = 'Error';
      outputMeta.textContent = '';
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function renderTop20(data) {
      const top20 = data.top20 || [];
      const universe = data.universe || '';
      const isMock = data._mock;

      outputTitle.textContent = `Top 20 · ${universe.toUpperCase().replace('NIFTY', 'NIFTY ')}`;
      outputMeta.innerHTML = isMock ? '<span class="badge">Mock data</span>' : '';

      if (!top20.length) {
        output.innerHTML = '<div class="empty">No results</div>';
        return;
      }

      const rows = top20.map((row, i) => {
        const score = Number(row.score);
        const scoreClass = score >= 0 ? 'positive' : 'negative';
        return `<tr>
          <td class="rank">${i + 1}</td>
          <td class="symbol">${escapeHtml(row.symbol)}</td>
          <td class="score ${scoreClass}">${score.toFixed(4)}</td>
        </tr>`;
      }).join('');

      output.innerHTML = `
        <table class="results-table">
          <thead><tr><th class="rank">#</th><th>Symbol</th><th class="score">Score</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function renderJSON(data) {
      outputTitle.textContent = 'Output';
      outputMeta.textContent = '';
      if (data.top20) {
        renderTop20(data);
      } else {
        output.innerHTML = `<pre style="font-family:'JetBrains Mono',monospace;font-size:0.8rem;overflow:auto;color:var(--text-muted)">${escapeHtml(JSON.stringify(data, null, 2))}</pre>`;
      }
    }

    async function scan() {
      setLoading(true);
      showLoading('Scanning universe...');
      try {
        const universe = document.getElementById('universe').value;
        const res = await fetch(`/api/scanner?universe=${universe}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        renderTop20(data);
      } catch (e) {
        showError(e.message);
      } finally {
        setLoading(false);
      }
    }

    async function rebalance() {
      setLoading(true);
      showLoading('Running rebalance...');
      try {
        const execute = document.getElementById('executeToggle').checked;
        const universe = document.getElementById('universe').value;
        const res = await fetch('/api/rebalance', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ execute, universe })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        if (data.data) renderTop20({ top20: data.data, universe: document.getElementById('universe').value });
        else if (data.top20) renderTop20(data);
        else renderJSON(data);
      } catch (e) {
        showError(e.message);
      } finally {
        setLoading(false);
      }
    }

    async function optimize() {
      setLoading(true);
      showLoading('Optimizing parameters...');
      try {
        const res = await fetch('/api/optimize', { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        renderJSON(data);
      } catch (e) {
        showError(e.message);
      } finally {
        setLoading(false);
      }
    }
  </script>
</body>
</html>
